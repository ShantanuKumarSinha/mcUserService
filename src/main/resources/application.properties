#eureka.client.serviceUrl.defaultZone= ${EUREKA_SERVER_ADDRESS}
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.client.serviceUrl.registerWithEureka=true

server.port=8082

spring.application.name=user-service

spring.datasource.url=jdbc:mysql://localhost:3306/userManagement?useSSL=false
#spring.datasource.username=root
#spring.datasource.password=Testing@123
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Testing@123}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.cloud.vault.host=localhost
spring.cloud.vault.port=8200
spring.cloud.vault.scheme=http
spring.cloud.vault.token=${VAULT_TOKEN}
spring.cloud.vault.kv.enabled=true
spring.cloud.vault.kv.backend=secret
spring.cloud.vault.application-name=${spring.application.name}

spring.config.import=optional:vault://

server.servlet.context-path=/userService/api/v1

logging.file.name=logs/user-service.log

spring.cloud.user-service.routes={id=user-service, uri=lb://user-service, predicates=[Path=/test/**]}
